<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="API Gateway Service - Microservice routing and load balancing">
    <title>API Gateway Service</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
        }
        
        h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .feature h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(46, 213, 115, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            margin-top: 30px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #2ed573;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .links {
            margin-top: 40px;
        }
        
        .links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .links a:hover {
            opacity: 1;
        }
        
        code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 API Gateway</h1>
        <p class="subtitle">High-performance microservice routing</p>
        
        <div class="features">
            <div class="feature">
                <h3>⚡</h3>
                <p>Edge Runtime</p>
            </div>
            <div class="feature">
                <h3>🔒</h3>
                <p>Rate Limiting</p>
            </div>
            <div class="feature">
                <h3>🌍</h3>
                <p>Global Network</p>
            </div>
            <div class="feature">
                <h3>📊</h3>
                <p>Health Monitoring</p>
            </div>
        </div>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>All Systems Operational</span>
        </div>
        
        <div class="links">
            <a href="/health">Health Check</a>
            <a href="/api/health">API Status</a>
        </div>
    </div>
</body>
</html>
